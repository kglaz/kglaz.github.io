<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>krzysztof.glaz - Judo is my life</title>
    <style>
        /* Resetowanie podstawowych marginesów */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f9;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #1a1a1a;
        }

        .content-wrapper {
            text-align: center;
            padding: 20px;
        }

        /* Główny napis */
        h1 {
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        /* Motto: judo is my life */
        .motto {
            font-size: clamp(1rem, 3vw, 1.5rem);
            font-weight: 600;
            color: #cc0000;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px; /* Odstęp przed listą domen */
        }

        /* Lista domen */
        .domain-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 15px; /* Odstępy między linkami */
        }

        .domain-list a {
            text-decoration: none;
            display: inline-block;
            font-size: clamp(1rem, 2.5vw, 1.8rem);
            color: #a0a0a0; /* Domyślny, przygaszony kolor */
            font-weight: 400;
            opacity: 0.6;
            
            /* Przypisanie animacji: trwa 5 sekund i zapętla się w nieskończoność */
            animation: highlight 5s infinite;
        }

        /* Opóźnienia animacji dla każdego elementu (co 1 sekundę) */
        .domain-list li:nth-child(1) a { animation-delay: 0s; }
        .domain-list li:nth-child(2) a { animation-delay: 1s; }
        .domain-list li:nth-child(3) a { animation-delay: 2s; }
        .domain-list li:nth-child(4) a { animation-delay: 3s; }
        .domain-list li:nth-child(5) a { animation-delay: 4s; }

        /* Definicja animacji podświetlania */
        @keyframes highlight {
            0%, 15% {
                color: #1a1a1a; /* Ciemny, wyraźny kolor */
                transform: scale(1.15); /* Lekkie powiększenie */
                font-weight: 700;
                opacity: 1;
            }
            20%, 100% {
                color: #a0a0a0; /* Powrót do przygaszonego koloru */
                transform: scale(1);
                font-weight: 400;
                opacity: 0.6;
            }
        }

        /* Interakcja myszką (opcjonalne, ale bardzo przydatne) */
        .domain-list:hover a {
            /* Zatrzymuje animację, gdy użytkownik najedzie kursorem na listę */
            animation-play-state: paused; 
            opacity: 0.4;
            transform: scale(1);
        }

        .domain-list a:hover {
            /* Podświetla ten konkretny link, na który najechano */
            color: #cc0000 !important;
            opacity: 1 !important;
            transform: scale(1.1) !important;
            transition: all 0.2s ease;
        }
    </style>
</head>
<body>

    <main class="content-wrapper">
        <!-- Główny tytuł i motto -->
        <h1>krzysztof.glaz</h1>
        <p class="motto">judo is my life</p>
        
        <!-- Animowana lista linków -->
        <ul class="domain-list">
            <li><a href="https://judotg.pl" target="_blank">judotg.pl</a></li>
            <li><a href="https://judoinfo.pl" target="_blank">judoinfo.pl</a></li>
            <li><a href="https://silesianopenjudokata.com" target="_blank">silesianopenjudokata.com</a></li>
            <li><a href="https://judokatamanager.com" target="_blank">judokatamanager.com</a></li>
            <li><a href="https://kata.pzjudo.pl" target="_blank">kata.pzjudo.pl</a></li>
        </ul>
    </main>

</body>
</html>
